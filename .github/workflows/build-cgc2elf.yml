name: Build cgc2elf

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-cgc2elf:
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 2️⃣ Install dependencies
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential libelf-dev git pandoc python3

      # 3️⃣ Prepare build directory
      - name: Create build directory
        run: mkdir -p $GITHUB_WORKSPACE/build_cgc2elf

      # 4️⃣ Clone cgc2elf source
      - name: Clone cgc2elf
        run: git clone https://github.com/CyberGrandChallenge/cgc2elf.git $GITHUB_WORKSPACE/build_cgc2elf/cgc2elf

      # 5️⃣ Build cgc2elf binary
      - name: Build cgc2elf
        run: |
          cd $GITHUB_WORKSPACE/build_cgc2elf/cgc2elf
          make clean
          make CFLAGS="-Wno-unused-result"

      # 6️⃣ Generate man page
      - name: Build cgc2elf man page
        run: |
          cd $GITHUB_WORKSPACE/build_cgc2elf/cgc2elf
          if command -v pandoc >/dev/null 2>&1; then
            pandoc -s -t man cgc2elf.md -o cgc2elf.md.tmp
            gzip -9 < cgc2elf.md.tmp > cgc2elf.1.gz
          else
            echo "⚠️ pandoc not installed, skipping man page"
          fi

      # 7️⃣ Check if binary exists
      - name: Check binary exists
        id: check_binary
        run: |
          FILE="$GITHUB_WORKSPACE/build_cgc2elf/cgc2elf/cgc2elf"
          if [ -f "$FILE" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      # 8️⃣ Upload binary artifact (conditional)
      - name: Upload cgc2elf binary
        if: steps.check_binary.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: cgc2elf-binary
          path: $GITHUB_WORKSPACE/build_cgc2elf/cgc2elf/cgc2elf
          if-no-files-found: warn
          compression-level: 6

      # 9️⃣ Check if man page exists
      - name: Check man page exists
        id: check_man
        run: |
          FILE="$GITHUB_WORKSPACE/build_cgc2elf/cgc2elf/cgc2elf.1.gz"
          if [ -f "$FILE" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      # 🔟 Upload man page artifact (conditional)
      - name: Upload cgc2elf man page
        if: steps.check_man.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: cgc2elf-man
          path: $GITHUB_WORKSPACE/build_cgc2elf/cgc2elf/cgc2elf.1.gz
          if-no-files-found: warn
          compression-level: 6

      # 1️⃣1️⃣ Show full build folder tree for debug
      - name: Show build directory tree
        run: |
          echo "🔍 Build directory contents:"
          tree -a -F $GITHUB_WORKSPACE/build_cgc2elf

# .github/workflows/build-cgc2elf.yml
name: Build cgc2elf

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-cgc2elf:
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # opt into Node.js 24

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            git \
            gcc-multilib \
            g++-multilib \
            libc6-dev-i386 \
            wget \
            zip \
            pandoc \
            gzip

      - name: Create build folder
        run: |
          mkdir -p $GITHUB_WORKSPACE/build_cgc2elf
          cd $GITHUB_WORKSPACE/build_cgc2elf
          git clone https://github.com/CyberGrandChallenge/cgc2elf.git

      - name: Build cgc2elf
        run: |
          cd $GITHUB_WORKSPACE/build_cgc2elf/cgc2elf
          # Build without warnings stopping compilation
          make CFLAGS="-O2 -w" || echo "⚠️ cgc2elf build failed"
          # Install to /usr/local/bin
          sudo cp cgc2elf /usr/local/bin || echo "⚠️ cgc2elf install failed"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cgc2elf
          path: $GITHUB_WORKSPACE/build_cgc2elf
          if-no-files-found: warn
          compression-level: 6

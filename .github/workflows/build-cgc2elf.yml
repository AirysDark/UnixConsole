name: Build cgc2elf

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      # 1️⃣ Checkout
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2️⃣ Install build tools ONLY (no pandoc)
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git gcc

      - name: Download cgc2elf.tar.gz
        run: curl -L -O https://raw.githubusercontent.com/AirysDark/Custom-CGPT/main/cgc2elf.tar.gz

      - name: Extract cgc2elf.tar.gz
        run: |
         mkdir -p cgc2elf-temp
         tar -xzf cgc2elf.tar.gz -C cgc2elf-temp
         # Rename/move to guaranteed folder name
         mv cgc2elf-temp/* cgc2elf
         rm -rf cgc2elf-temp

        
      # 4️⃣ Build (NO man page)
      - name: Build cgc2elf binary only
        run: |
          cd cgc2elf
          make clean || true
          make CFLAGS="-O2 -w -Wno-unused-result" cgc2elf

      # 5️⃣ VERIFY (so it NEVER silently fails again)
      - name: Verify binary exists
        run: |
          ls -l cgc2elf
          file cgc2elf/cgc2elf
        

          

      # 6️⃣ Upload EXACT file (correct path)
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: cgc2elf-binary
          path: cgc2elf/cgc2elf
          if-no-files-found: error

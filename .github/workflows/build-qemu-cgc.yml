name: Build QEMU-CGC

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-qemu-cgc:
    runs-on: ubuntu-22.04 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            git \
            python2 \
            python2-minimal \
            ninja-build \
            libglib2.0-dev \
            libfdt-dev \
            libpixman-1-dev \
            zlib1g-dev \
            wget \
            unzip \
            zip \
            tree

      - name: Clone QEMU-CGC
        run: |
          git clone https://github.com/mechaphish/qemu-cgc.git build_qemu-cgc

      
      - name: Build QEMU-CGC
        run: |
          cd build_qemu-cgc
          # --disable-guest-agent and --disable-tools bypasses the 'major/minor' errors
          ./configure --python=python2 \
                      --target-list=i386-linux-user,x86_64-linux-user \
                      --static \
                      --disable-werror \
                      --disable-guest-agent \
                      --disable-tools
          make -j$(nproc)


      - name: Verify QEMU-CGC binaries
        run: |
          echo "🔍 Checking binaries:"
          ls -l build_qemu-cgc/i386-linux-user/qemu-i386 || echo "⚠️ 32-bit binary missing"
          ls -l build_qemu-cgc/x86_64-linux-user/qemu-x86_64 || echo "⚠️ 64-bit binary missing"

      - name: Upload QEMU-CGC 32-bit binary
        uses: actions/upload-artifact@v4
        with:
          name: qemu-cgc-i386
          path: build_qemu-cgc/i386-linux-user/qemu-i386
          if-no-files-found: error

      - name: Upload QEMU-CGC 64-bit binary
        uses: actions/upload-artifact@v4
        with:
          name: qemu-cgc-x86_64
          path: build_qemu-cgc/x86_64-linux-user/qemu-x86_64
          if-no-files-found: error

name: Build QEMU-CGC

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-qemu-cgc:
    runs-on: ubuntu-22.04 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            git \
            python2 \
            python2-minimal \
            ninja-build \
            libglib2.0-dev \
            libfdt-dev \
            libpixman-1-dev \
            zlib1g-dev \
            wget \
            unzip \
            zip \
            tree

      # 3️⃣ Clone QEMU-CGC
      - name: Clone QEMU-CGC
        run: |
          git clone https://github.com/mechaphish/qemu-cgc.git build_qemu-cgc

      # 3.5️⃣ aggressive patch to force 64-bit compilation
      - name: Patch x86_64 headers
        run: |
          # 1. Get standard headers
          git clone --depth 1 --branch v2.3.0 https://gitlab.com/qemu-project/qemu.git qemu_standard
          mkdir -p build_qemu-cgc/linux-user/x86_64
          cp -r qemu_standard/linux-user/x86_64/* build_qemu-cgc/linux-user/x86_64/
          
          # 2. Nuke ALL #error lines in the linux-user directory
          # This handles any indentation and removes the block entirely
          find build_qemu-cgc/linux-user -type f -name "*.[ch]" -exec sed -i 's/^[[:space:]]*#error.*//g' {} +
          
          # 3. Nuke ALL _Static_assert lines
          find build_qemu-cgc -type f -name "*.[ch]" -exec sed -i 's/.*_Static_assert.*//g' {} +
          
          # 4. Fix the 'undeclared' CGC syscalls in syscall.c
          # This simply deletes the custom CGC cases from the switch statement for the 64-bit build
          # We use a broad match to ensure those 'TARGET_NR_receive' etc. lines don't stop the build
          sed -i '/case TARGET_NR_receive:/,/case TARGET_NR_random:/d' build_qemu-cgc/linux-user/syscall.c
          
          rm -rf qemu_standard






      # 4️⃣ Build QEMU-CGC (Now with x86_64 enabled)
      - name: Build QEMU-CGC
        run: |
          cd build_qemu-cgc
          ./configure --python=python2 \
                      --target-list=i386-linux-user,x86_64-linux-user \
                      --disable-werror \
                      --disable-guest-agent \
                      --disable-tools \
                      --disable-docs \
                      --disable-system
          
          # Build the core and both architecture subdirectories
          make -j$(nproc) libqemuutil.a libqemustub.a
          make -j$(nproc) subdir-i386-linux-user
          make -j$(nproc) subdir-x86_64-linux-user




      - name: Verify QEMU-CGC binaries
        run: |
          echo "🔍 Checking binaries:"
          ls -l build_qemu-cgc/i386-linux-user/qemu-i386 || echo "⚠️ 32-bit binary missing"
          ls -l build_qemu-cgc/x86_64-linux-user/qemu-x86_64 || echo "⚠️ 64-bit binary missing"



      # 6️⃣ Upload artifacts (Paths change slightly without static)
      - name: Upload QEMU-CGC 32-bit binary
        uses: actions/upload-artifact@v4
        with:
          name: qemu-cgc-i386
          path: build_qemu-cgc/i386-linux-user/qemu-i386

      - name: Upload QEMU-CGC 64-bit binary
        uses: actions/upload-artifact@v4
        with:
          name: qemu-cgc-x86_64
          path: build_qemu-cgc/x86_64-linux-user/qemu-x86_64

name: Build QEMU-CGC Dual Arch

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-qemu:
    runs-on: ubuntu-22.04 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            python2 build-essential git ninja-build libglib2.0-dev \
            libfdt-dev libpixman-1-dev zlib1g-dev tree

      # --- 32-BIT BUILD (DISABLE TOOLS TO AVOID ERROR) ---
      - name: Build 32-bit QEMU-CGC
        run: |
          git clone https://github.com/mechaphish/qemu-cgc.git build_32bit
          cd build_32bit
          ./configure --python=python2 --target-list=i386-linux-user --static \
                      --disable-werror --disable-system --disable-guest-agent --disable-tools
          make -j$(nproc)

      # --- 64-BIT BUILD (PATCHED) ---
      - name: Build 64-bit QEMU-CGC
        run: |
          git clone https://github.com/mechaphish/qemu-cgc.git build_64bit
          git clone --depth 1 --branch v2.3.0 https://gitlab.com/qemu-project/qemu.git qemu_standard
          
          mkdir -p build_64bit/linux-user/x86_64
          cp -r qemu_standard/linux-user/x86_64/* build_64bit/linux-user/x86_64/
          
          # 1. REGISTER PATCH: Catch all variations of regs-> and env->
          find build_64bit -type f -name "*.[ch]" -exec sed -i 's/\b\(regs[->.]*\)esp/\1rsp/g' {} +
          find build_64bit -type f -name "*.[ch]" -exec sed -i 's/\b\(regs[->.]*\)eip/\1rip/g' {} +
          find build_64bit -type f -name "*.[ch]" -exec sed -i 's/\b\(regs[->.]*\)eax/\1rax/g' {} +
          find build_64bit -type f -name "*.[ch]" -exec sed -i 's/\b\(regs[->.]*\)ebx/\1rbx/g' {} +
          find build_64bit -type f -name "*.[ch]" -exec sed -i 's/\b\(regs[->.]*\)ecx/\1rcx/g' {} +
          find build_64bit -type f -name "*.[ch]" -exec sed -i 's/\b\(regs[->.]*\)edx/\1rdx/g' {} +
          find build_64bit -type f -name "*.[ch]" -exec sed -i 's/\b\(regs[->.]*\)esi/\1rsi/g' {} +
          find build_64bit -type f -name "*.[ch]" -exec sed -i 's/\b\(regs[->.]*\)edi/\1rdi/g' {} +
          find build_64bit -type f -name "*.[ch]" -exec sed -i 's/\b\(regs[->.]*\)ebp/\1rbp/g' {} +
          find build_64bit -type f -name "*.[ch]" -exec sed -i 's/env->eip/env->rip/g' {} +

          # 2. FIX MISSING MACRO: TASK_UNMAPPED_BASE for x86_64
          sed -i '/#define MMAP_LAYOUT_H/a #define TASK_UNMAPPED_BASE (1ULL << 44)' build_64bit/linux-user/mmap.c || true
          
          # 3. GLOBAL NUKES
          find build_64bit -type f -name "*.[ch]" -exec sed -i 's/^[[:space:]]*#[[:space:]]*error.*//g' {} +
          find build_64bit -type f -name "*.[ch]" -exec sed -i 's/.*_Static_assert.*//g' {} +
          
          # 4. REMOVE CGC SYSCALLS
          sed -i '/case TARGET_NR_receive:/,/case TARGET_NR_random:/d' build_64bit/linux-user/syscall.c
          sed -i '/case TARGET_NR_terminate:/,/case TARGET_NR_random:/d' build_64bit/linux-user/strace.c

          cd build_64bit
          ./configure --python=python2 --target-list=x86_64-linux-user --static \
                      --disable-werror --disable-system --disable-guest-agent --disable-tools
          make -j$(nproc)

      # --- UPLOAD BOTH ---
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qemu-cgc-binaries
          path: |
            build_32bit/i386-linux-user/qemu-i386
            build_64bit/x86_64-linux-user/qemu-x86_64

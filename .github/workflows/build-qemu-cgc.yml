name: Build QEMU-CGC x86_64

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-qemu:
    runs-on: ubuntu-22.04

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Install dependencies
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python2 build-essential git ninja-build \
            libglib2.0-dev libfdt-dev libpixman-1-dev zlib1g-dev tree

      # 3️⃣ Clone QEMU-CGC and standard QEMU for patches
      - name: Clone QEMU-CGC and patch
        run: |
          git clone https://github.com/mechaphish/qemu-cgc.git build_cgc
          git clone --depth 1 --branch v2.3.0 https://gitlab.com/qemu-project/qemu.git qemu_std

          # Copy missing x86_64 architecture files
          mkdir -p build_cgc/linux-user/x86_64
          cp -r qemu_std/linux-user/x86_64/* build_cgc/linux-user/x86_64/

          # Ensure TASK_UNMAPPED_BASE is defined
          sed -i '/#define MMAP_LAYOUT_H/a #define TASK_UNMAPPED_BASE (1ULL << 44)' build_cgc/linux-user/mmap.c || true

          # Patch CPU structure: replace eip with rip for 64-bit
          sed -i 's/target_ulong eip;/#ifdef TARGET_X86_64\n    target_ulong rip;\n#else\n    target_ulong eip;\n#endif/g' build_cgc/target-i386/cpu.h
          find build_cgc -type f -name "*.[ch]" -exec sed -i 's/env->eip/env->rip/g' {} +

          # Fix undefined major/minor macros
          sed -i '1i#include <sys/sysmacros.h>' build_cgc/qga/commands-posix.c

          # Register patch: update all 32-bit registers to 64-bit equivalents
          find build_cgc -type f -name "*.[ch]" -exec sed -i 's/\b\(regs[->.]*\)esp/\1rsp/g' {} +
          find build_cgc -type f -name "*.[ch]" -exec sed -i 's/\b\(regs[->.]*\)eip/\1rip/g' {} +
          find build_cgc -type f -name "*.[ch]" -exec sed -i 's/\b\(regs[->.]*\)eax/\1rax/g' {} +
          find build_cgc -type f -name "*.[ch]" -exec sed -i 's/\b\(regs[->.]*\)ebx/\1rbx/g' {} +
          find build_cgc -type f -name "*.[ch]" -exec sed -i 's/\b\(regs[->.]*\)ecx/\1rcx/g' {} +
          find build_cgc -type f -name "*.[ch]" -exec sed -i 's/\b\(regs[->.]*\)edx/\1rdx/g' {} +
          find build_cgc -type f -name "*.[ch]" -exec sed -i 's/\b\(regs[->.]*\)esi/\1rsi/g' {} +
          find build_cgc -type f -name "*.[ch]" -exec sed -i 's/\b\(regs[->.]*\)edi/\1rdi/g' {} +
          find build_cgc -type f -name "*.[ch]" -exec sed -i 's/\b\(regs[->.]*\)ebp/\1rbp/g' {} +

          # Remove CGC syscalls for 64-bit pass
          sed -i '/case TARGET_NR_receive:/,/case TARGET_NR_random:/d' build_cgc/linux-user/syscall.c
          sed -i '/case TARGET_NR_terminate:/,/case TARGET_NR_random:/d' build_cgc/linux-user/strace.c

          # Remove 32-bit-only static asserts / errors
          find build_cgc -type f -name "*.[ch]" -exec sed -i 's/^[[:space:]]*#[[:space:]]*error.*//g' {} +
          find build_cgc -type f -name "*.[ch]" -exec sed -i 's/.*_Static_assert.*//g' {} +

          # Fix printf formats for abi_ulong and abi_long
          sed -i 's/%x/%lx/g' build_cgc/linux-user/syscall.c
          sed -i 's/%u/%lu/g' build_cgc/linux-user/syscall.c
          sed -i 's/%d/%ld/g' build_cgc/linux-user/syscall.c

      # 4️⃣ Configure and build 64-bit CGC target
      - name: Build QEMU-CGC 64-bit
        run: |
          cd build_cgc
          ./configure --python=python2 \
                      --target-list=x86_64-linux-user \
                      --static \
                      --disable-werror \
                      --disable-system \
                      --disable-tools
          make -j$(nproc)

      # 5️⃣ Verify the binary exists
      - name: Verify binary
        run: |
          BIN="build_cgc/x86_64-linux-user/qemu-x86_64"
          if [ -f "$BIN" ]; then
            echo "✅ Binary found:"
            file "$BIN"
          else
            echo "⚠️ Binary missing!"
            exit 1
          fi

      # 6️⃣ Upload the 64-bit CGC artifact
      - name: Upload 64-bit CGC binary
        uses: actions/upload-artifact@v4
        with:
          name: qemu-cgc-64bit
          path: build_cgc/x86_64-linux-user/qemu-x86_64
          if-no-files-found: error

      # 7️⃣ Optional: print a short workspace tree for verification
      - name: Workspace tree (debug)
        run: tree -L 3 build_cgc/x86_64-linux-user || true

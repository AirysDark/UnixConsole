name: Build QEMU-CGC Dual Arch

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-qemu:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            git \
            python2 \
            python2-minimal \
            ninja-build \
            libglib2.0-dev \
            libfdt-dev \
            libpixman-1-dev \
            zlib1g-dev \
            wget \
            unzip \
            zip \
            tree

      # --- 32-BIT BUILD (AUTHENTIC) ---
      - name: Setup 32-bit Folder
        run: |
          git clone https://github.com/mechaphish/qemu-cgc.git build_32bit
          cd build_32bit
          ./configure --python=python2 \
                      --target-list=i386-linux-user \
                      --disable-werror \
                      --disable-guest-agent \
                      --disable-tools \
                      --disable-docs \
                      --disable-system
          
          # Build the core and both architecture subdirectories
          make -j$(nproc) libqemuutil.a libqemustub.a
          make -j$(nproc) subdir-i386-linux-user
          

      # --- 64-BIT BUILD (PATCHED) ---
      - name: Setup 64-bit Folder
        run: |
          git clone https://github.com/mechaphish/qemu-cgc.git build_64bit
          git clone --depth 1 --branch v2.3.0 https://gitlab.com/qemu-project/qemu.git qemu_standard
          
          # Patch x86_64 headers into the 64bit folder
          mkdir -p build_64bit/linux-user/x86_64
          cp -r qemu_standard/linux-user/x86_64/* build_64bit/linux-user/x86_64/
          
          # Aggressive Register Patch (Safe here because it's a separate folder)
          find build_64bit -type f -name "*.[ch]" -exec sed -i 's/env->eip/env->rip/g' {} +
          find build_64bit -type f -name "*.[ch]" -exec sed -i 's/regs->esp/regs->rsp/g' {} +
          find build_64bit -type f -name "*.[ch]" -exec sed -i 's/regs->eip/regs->rip/g' {} +
          
          # Nuke hardcoded blocks
          find build_64bit -type f -name "*.[ch]" -exec sed -i 's/^[[:space:]]*#[[:space:]]*error.*//g' {} +
          find build_64bit -type f -name "*.[ch]" -exec sed -i 's/.*_Static_assert.*//g' {} +
          
          # Remove CGC syscalls that only exist in 32-bit headers
          sed -i '/case TARGET_NR_receive:/,/case TARGET_NR_random:/d' build_64bit/linux-user/syscall.c
          sed -i '/case TARGET_NR_terminate:/,/case TARGET_NR_random:/d' build_64bit/linux-user/strace.c

          cd build_64bit
          ./configure --python=python2 \
                      --target-list=x86_64-linux-user \
                      --disable-werror \
                      --disable-guest-agent \
                      --disable-tools \
                      --disable-docs \
                      --disable-system
          
          # Build the core and both architecture subdirectories
          make -j$(nproc) libqemuutil.a libqemustub.a
          make -j$(nproc) subdir-x86_64-linux-user

      # --- UPLOAD BOTH ---
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qemu-cgc-binaries
          path: |
            build_32bit/i386-linux-user/qemu-i386
            build_64bit/x86_64-linux-user/qemu-x86_64

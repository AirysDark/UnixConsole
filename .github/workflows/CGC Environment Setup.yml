name: Build CGC/DECREE Environment

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-components:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [kernel, libcgc, cgc2elf, qemu-cgc]
    continue-on-error: true
    steps:

      # ------------ Checkout ------------
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # ------------ Install deps ------------
      - name: Install build dependencies
        run: |
          sudo apt update
          # standard build tools
          sudo apt install -y git wget unzip zip build-essential \
            libc6-dev-i386 gcc-multilib g++-multilib
          # old GCC for DECREE kernel
          sudo apt install -y gcc-4.8 g++-4.8
          # ensure Python2 for projects that expect it
          sudo apt install -y python2

      # ------------ Create working dir ------------
      - name: Prepare component workspace
        run: mkdir -p $GITHUB_WORKSPACE/build_${{ matrix.component }}

      # ------------ Clone sources ------------
      - name: Clone source for ${{ matrix.component }}
        run: |
          cd $GITHUB_WORKSPACE/build_${{ matrix.component }}
          case "${{ matrix.component }}" in
            kernel)
              git clone https://github.com/CyberGrandChallenge/linux-source-3.13.2-cgc.git || echo "kernel clone failed"
              ;;
            libcgc)
              git clone https://github.com/CyberGrandChallenge/libcgc.git || echo "libcgc clone failed"
              ;;
            cgc2elf)
              git clone https://github.com/CyberGrandChallenge/cgc2elf.git || echo "cgc2elf clone failed"
              ;;
            qemu-cgc)
              git clone https://github.com/mechaphish/qemu-cgc.git || echo "qemu-cgc clone failed"
              ;;
          esac

      # ------------ Build each component ------------
      - name: Build ${{ matrix.component }}
        run: |
          set +e
          cd $GITHUB_WORKSPACE/build_${{ matrix.component }}
          case "${{ matrix.component }}" in

            kernel)
              # rename the kernel dir for easier paths
              mv linux-source-3.13.2-cgc kernel-src
              cd kernel-src
              # use older GCC for DECREE build
              make ARCH=i386 CC=gcc-4.8 HOSTCC=gcc-4.8 defconfig
              make ARCH=i386 CC=gcc-4.8 HOSTCC=gcc-4.8 -j$(nproc)
              ;;

            libcgc)
              cd libcgc
              # build as 32-bit with multilib
              make CC="gcc -m32" AS="as --32"
              sudo make install
              ;;

            cgc2elf)
              cd cgc2elf
              # disable -Werror by skipping warnings
              make CFLAGS="-O2 -w"
              sudo cp cgc2elf /usr/local/bin || echo "install cgc2elf failed"
              ;;

            qemu-cgc)
              if [ -d qemu-cgc ]; then
                cd qemu-cgc
                # QEMU-CGC uses its custom configure script
                if [ -f cgc_configure_debug ]; then
                  ./cgc_configure_debug
                elif [ -f cgc_configure_opt ]; then
                  ./cgc_configure_opt
                else
                  echo "No CGC configure script found"
                fi
                # build
                make -j$(nproc)
              else
                echo "qemu-cgc repo not present"
              fi
              ;;

          esac

      # ------------ Upload artifact ------------
      - name: Upload ${{ matrix.component }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.component }}
          path: $GITHUB_WORKSPACE/build_${{ matrix.component }}

  combine:
    runs-on: ubuntu-latest
    needs: build-components
    steps:

      - name: Download all component artifacts
        uses: actions/download-artifact@v4
        with:
          path: $GITHUB_WORKSPACE/cgc_env

      - name: List combined folders
        run: ls -al $GITHUB_WORKSPACE/cgc_env

      - name: Zip CGC environment
        run: |
          cd $GITHUB_WORKSPACE
          zip -r CGPT.zip cgc_env

      - name: Upload CGPT.zip
        uses: actions/upload-artifact@v4
        with:
          name: CGPT
          path: $GITHUB_WORKSPACE/CGPT.zip

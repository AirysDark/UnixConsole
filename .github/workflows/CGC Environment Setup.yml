name: CGC Environment Setup (Matrix Build)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-repo:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: [cgc-linux-dev, libcgc, cgc2elf, qemu-cgc]
    defaults:
      run:
        shell: bash
    steps:
      # -----------------------------
      # 1. Checkout repository
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # -----------------------------
      # 2. Install dependencies
      # -----------------------------
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git unzip curl build-essential wget zip software-properties-common
          # Install GCC 9 for DECREE kernel
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt update
          sudo apt install -y gcc-9 g++-9

      # -----------------------------
      # 3. Create working folder for this job
      # -----------------------------
      - name: Create working folder
        run: mkdir -p $GITHUB_WORKSPACE/build_${{ matrix.repo }}

      # -----------------------------
      # 4. Clone or download the repo
      # -----------------------------
      - name: Fetch repository
        run: |
          cd $GITHUB_WORKSPACE/build_${{ matrix.repo }}
          case "${{ matrix.repo }}" in
            cgc-linux-dev)
              git clone https://github.com/CyberGrandChallenge/linux-source-3.13.2-cgc.git
              ;;
            libcgc)
              git clone https://github.com/CyberGrandChallenge/libcgc.git
              ;;
            cgc2elf)
              git clone https://github.com/CyberGrandChallenge/cgc2elf.git
              ;;
            qemu-cgc)
              git clone https://github.com/mechaphish/qemu-cgc.git || echo "QEMU-CGC not available, skipping"
              ;;
          esac

      # -----------------------------
      # 5. Build steps per repo
      # -----------------------------
      - name: Build repository
        run: |
          cd $GITHUB_WORKSPACE/build_${{ matrix.repo }}
          case "${{ matrix.repo }}" in
            cgc-linux-dev)
              cd cgc-linux-dev
              make ARCH=i386 CC=gcc-9 HOSTCC=gcc-9 defconfig
              make ARCH=i386 CC=gcc-9 HOSTCC=gcc-9 -j$(nproc)
              ;;
            libcgc)
              cd libcgc
              make
              sudo make install
              ;;
            cgc2elf)
              cd cgc2elf
              make
              sudo cp cgc2elf /usr/local/bin
              ;;
            qemu-cgc)
              if [ -d qemu-cgc ]; then
                cd qemu-cgc
                ./configure --target-list=i386-softmmu
                make -j$(nproc)
              else
                echo "⚠️ QEMU-CGC folder not found, skipping."
              fi
              ;;
          esac

      # -----------------------------
      # 6. Upload built folder as artifact
      # -----------------------------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.repo }}
          path: $GITHUB_WORKSPACE/build_${{ matrix.repo }}

  combine-artifacts:
    runs-on: ubuntu-latest
    needs: build-repo
    steps:
      # -----------------------------
      # 1. Download all artifacts from matrix jobs
      # -----------------------------
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: $GITHUB_WORKSPACE/cgc_env

      # -----------------------------
      # 2. Verify directories
      # -----------------------------
      - name: List combined directories
        run: ls -l $GITHUB_WORKSPACE/cgc_env

      # -----------------------------
      # 3. Zip the combined cgc_env
      # -----------------------------
      - name: Zip CGC environment
        run: |
          cd $GITHUB_WORKSPACE
          zip -r CGPT.zip cgc_env

      # -----------------------------
      # 4. Upload the final zip
      # -----------------------------
      - name: Upload CGPT.zip
        uses: actions/upload-artifact@v4
        with:
          name: CGPT
          path: $GITHUB_WORKSPACE/CGPT.zip

name: CGC Environment Setup (Matrix Build)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-repo:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: [cgc-linux-dev, libcgc, cgc2elf, qemu-cgc]
    continue-on-error: true
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git unzip curl build-essential wget zip software-properties-common
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt update
          sudo apt install -y gcc-9 g++-9

      - name: Create working folder
        run: mkdir -p $GITHUB_WORKSPACE/build_${{ matrix.repo }}

      - name: Clone repository
        run: |
          cd $GITHUB_WORKSPACE/build_${{ matrix.repo }}
          case "${{ matrix.repo }}" in
            cgc-linux-dev)
              git clone https://github.com/CyberGrandChallenge/linux-source-3.13.2-cgc.git temp
              mv temp cgc-linux-dev
              ;;
            libcgc)
              git clone https://github.com/CyberGrandChallenge/libcgc.git
              ;;
            cgc2elf)
              git clone https://github.com/CyberGrandChallenge/cgc2elf.git
              ;;
            qemu-cgc)
              git clone https://github.com/mechaphish/qemu-cgc.git || echo "⚠️ QEMU-CGC not available"
              ;;
          esac

      - name: Build repository
        run: |
          set +e  # continue even if build fails
          cd $GITHUB_WORKSPACE/build_${{ matrix.repo }}
          case "${{ matrix.repo }}" in
            cgc-linux-dev)
              cd cgc-linux-dev
              make ARCH=i386 CC=gcc-9 HOSTCC=gcc-9 defconfig
              make ARCH=i386 CC=gcc-9 HOSTCC=gcc-9 -j$(nproc)
              ;;
            libcgc)
              cd libcgc
              make
              sudo make install
              ;;
            cgc2elf)
              cd cgc2elf
              make
              sudo cp cgc2elf /usr/local/bin
              ;;
            qemu-cgc)
              if [ -d qemu-cgc ]; then
                cd qemu-cgc
                ./configure --target-list=i386-softmmu
                make -j$(nproc)
              fi
              ;;
          esac

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.repo }}
          path: $GITHUB_WORKSPACE/build_${{ matrix.repo }}/*

  combine-artifacts:
    runs-on: ubuntu-latest
    needs: build-repo
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: $GITHUB_WORKSPACE/cgc_env

      - name: List combined directories
        run: ls -l $GITHUB_WORKSPACE/cgc_env

      - name: Zip CGC environment
        run: |
          cd $GITHUB_WORKSPACE
          zip -r CGPT.zip cgc_env

      - name: Upload final CGPT.zip
        uses: actions/upload-artifact@v4
        with:
          name: CGPT
          path: $GITHUB_WORKSPACE/CGPT.zip

name: CGC Environment Setup

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-cgc:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      # -----------------------------
      # 1. Checkout this repo
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # -----------------------------
      # 2. Install dependencies
      # -----------------------------
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git unzip curl build-essential wget zip software-properties-common
          # Install GCC 9 for DECREE kernel build
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt update
          sudo apt install -y gcc-9 g++-9

      # -----------------------------
      # 3. Create working directory
      # -----------------------------
      - name: Create CGC source folder
        run: mkdir -p $GITHUB_WORKSPACE/cgc_env

      # -----------------------------
      # 4. Download and unzip repositories
      # -----------------------------
      - name: Download and extract ZIPs
        run: |
          cd $GITHUB_WORKSPACE/cgc_env
          # Download ZIPs
          curl -L -o cgc-linux-dev.zip https://github.com/CyberGrandChallenge/linux-source-3.13.2-cgc/archive/refs/heads/master.zip
          curl -L -o cgc-cbs.zip https://github.com/GrammaTech/cgc-cbs/archive/refs/heads/master.zip
          curl -L -o cgc2elf.zip https://github.com/CyberGrandChallenge/cgc2elf/archive/refs/heads/master.zip
          curl -L -o libcgc.zip https://github.com/CyberGrandChallenge/libcgc/archive/refs/heads/master.zip
          curl -L -o qemu-cgc.zip https://github.com/mechaphish/qemu-cgc/archive/refs/heads/master.zip || echo "QEMU-CGC ZIP not available, skipping"
          
          # Unzip and rename directories
          unzip -q cgc-linux-dev.zip
          mv linux-source-3.13.2-cgc-master cgc-linux-dev
          
          unzip -q cgc-cbs.zip
          mv cgc-cbs-master cgc-cbs
          
          unzip -q cgc2elf.zip
          mv cgc2elf-master cgc2elf
          
          unzip -q libcgc.zip
          mv libcgc-master libcgc
          
          if [ -f qemu-cgc.zip ]; then
            unzip -q qemu-cgc.zip
            mv qemu-cgc-master qemu-cgc
          fi
          
          # Remove ZIP files
          rm -f *.zip

      # -----------------------------
      # 5. Build DECREE kernel (i386, GCC 9)
      # -----------------------------
      - name: Build DECREE kernel
        run: |
          cd $GITHUB_WORKSPACE/cgc_env/cgc-linux-dev
          make ARCH=i386 CC=gcc-9 HOSTCC=gcc-9 defconfig
          make ARCH=i386 CC=gcc-9 HOSTCC=gcc-9 -j$(nproc)

      # -----------------------------
      # 6. Build libcgc
      # -----------------------------
      - name: Build libcgc
        run: |
          cd $GITHUB_WORKSPACE/cgc_env/libcgc
          make
          sudo make install

      # -----------------------------
      # 7. Build cgc2elf
      # -----------------------------
      - name: Build cgc2elf
        run: |
          cd $GITHUB_WORKSPACE/cgc_env/cgc2elf
          make
          sudo cp cgc2elf /usr/local/bin

      # -----------------------------
      # 8. Optional: Build QEMU-CGC
      # -----------------------------
      - name: Build QEMU-CGC
        run: |
          QEMU_DIR=$GITHUB_WORKSPACE/cgc_env/qemu-cgc
          if [ -d "$QEMU_DIR" ]; then
            cd "$QEMU_DIR"
            ./configure --target-list=i386-softmmu
            make -j$(nproc)
          else
            echo "⚠️ QEMU-CGC folder not found, skipping."

      # -----------------------------
      # 9. List directories (verification)
      # -----------------------------
      - name: List all directories
        run: ls -l $GITHUB_WORKSPACE/cgc_env

      # -----------------------------
      # 10. Zip the entire cgc_env folder
      # -----------------------------
      - name: Zip CGC environment
        run: |
          cd $GITHUB_WORKSPACE
          zip -r CGPT.zip cgc_env

      # -----------------------------
      # 11. Upload zip as workflow artifact
      # -----------------------------
      - name: Upload CGPT.zip
        uses: actions/upload-artifact@v4
        with:
          name: CGPT
          path: $GITHUB_WORKSPACE/CGPT.zip

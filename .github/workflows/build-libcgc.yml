name: Build libcgc

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-libcgc:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git gcc-multilib g++-multilib libc6-dev-i386 wget zip

      - name: Clone libcgc
        run: |
          mkdir -p $GITHUB_WORKSPACE/build_libcgc
          cd $GITHUB_WORKSPACE/build_libcgc
          git clone https://github.com/CyberGrandChallenge/libcgc.git

      - name: Build libcgc
        run: |
          cd $GITHUB_WORKSPACE/build_libcgc/libcgc
          make CC="gcc -m32" AS="as --32" || echo "⚠️ libcgc build failed"
          sudo make install || echo "⚠️ libcgc install failed"

      - name: Upload libcgc artifact
        uses: actions/upload-artifact@v4
        with:
          name: libcgc
          path: $GITHUB_WORKSPACE/build_libcgc

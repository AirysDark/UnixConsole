name: Build libcgc

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-libcgc:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 2️⃣ Install dependencies
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git gcc-multilib g++-multilib xlsxwriter pycrypto defusedxml clang pyyaml matplotlib g++ libstdc++-12-dev g++-12 libstdc++-dev libc6-dev-i386  make wget zip

      # 3️⃣ Clone libcgc
      - name: Clone libcgc
        run: |
          git clone https://github.com/trailofbits/cb-multios

      # 4️⃣ Build libcgc
      - name: Build libcgc
        run: |
          cd cb-multios
           sudo ln -s /usr/lib/x86_64-linux-gnu/libstdc++.so.6 /usr/lib/x86_64-linux-gnu/libstdc++.so
           cd /home/runner/work/UnixConsole/UnixConsole/cb-multios/
           rm -rf build64/
           BUILD64=1 ./build.sh








      # 5️⃣ Verify binary exists
      - name: Verify libcgc binary
        run: |
          echo "🔍 Checking build directory:"
          ls -l libcgc
          file libcgc

      # 6️⃣ Upload libcgc binary artifact
      - name: Upload libcgc binary
        uses: actions/upload-artifact@v4
        with:
          name: libcgc-binary
          path: libcgc
          if-no-files-found: error
          compression-level: 6

      # 7️⃣ Debug: Print full workspace tree
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:         
          name: libcgc-binary
          path: libcgc 
          if-no-files-found: error

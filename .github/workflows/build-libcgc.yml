name: Build libcgc

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-libcgc:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 2️⃣ Install dependencies
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git gcc-multilib g++-multilib \
          clang make wget zip libc6-dev-i386 libstdc++-12-dev g++-12 \
          python3-pip python3-venv

      # 3️⃣ Clone cb-multios (libcgc)
      - name: Clone cb-multios
        run: |
          git clone https://github.com/trailofbits/cb-multios.git
          cd cb-multios
          git checkout main

      # 4️⃣ Build libcgc
      - name: Build libcgc
        run: |
          cd cb-multios
          # Fix libstdc++ symlink
          sudo ln -sf /usr/lib/x86_64-linux-gnu/libstdc++.so.6 /usr/lib/x86_64-linux-gnu/libstdc++.so
          # Clean previous build
          rm -rf build64/
          # Run build script with BUILD64=1
          BUILD64=1 ./build.sh

      # 5️⃣ Verify build output
      - name: Verify libcgc build
        run: |
          echo "🔍 Listing cb-multios directory contents:"
          ls -l
          echo "🔍 Check libcgc binaries:"
          find . -type f -name 'libcgc*' -exec file {} \;

      # 6️⃣ Upload libcgc artifacts
      - name: Upload libcgc binaries
        uses: actions/upload-artifact@v4
        with:
          name: libcgc-binaries
          path: cb-multios/build64
          if-no-files-found: error
          compression-level: 6

      # 7️⃣ Debug: Print full workspace tree
      - name: Print full workspace tree
        run: |
          echo "🔍 Full workspace tree:"
          tree -F -A $GITHUB_WORKSPACE || true
